name: Parity

# Opt-in workflow: runs the Strapi parity harness on demand.
#
# This is workflow_dispatch only because the harness requires the full Strapi
# reference setup (see tools/parity/setup-strapi.sh) plus a Chromium browser
# install. It is too expensive and too environment-dependent to gate every PR.
# Trigger from the Actions tab when you need fresh parity captures.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    name: parity
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Capture parity screenshots
        run: bun tools/parity/capture.ts

      - name: Diff parity screenshots
        run: bun tools/parity/diff.ts

      - name: Report parity results
        run: bun tools/parity/report.ts

      - name: Upload parity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-output
          path: tools/parity/output
          if-no-files-found: ignore
